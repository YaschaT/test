<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#030716" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25  0 0 0 0 0.42  0 0 0 0 1  0 0 0 0.55 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <linearGradient id="shine" x1="128" y1="70" x2="384" y2="442" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity=".42"/>
      <stop offset=".35" stop-color="#FFFFFF" stop-opacity=".08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="catGrad" x1="104" y1="80" x2="408" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB642"/>
      <stop offset="1" stop-color="#F07818"/>
    </linearGradient>
    <radialGradient id="catHighlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(178 134) rotate(45) scale(280)">
      <stop stop-color="#FFFFFF" stop-opacity=".45"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
  </defs>
  <g>
    <rect x="72" y="72" width="368" height="368" rx="104" fill="url(#catGrad)" filter="url(#softShadow)"/>
    <rect x="100" y="100" width="312" height="312" rx="82" fill="#0C1430" fill-opacity=".16" stroke="#FFFFFF" stroke-opacity=".18" stroke-width="7"/>
    <rect x="72" y="72" width="368" height="368" rx="104" fill="url(#catHighlight)"/>
    <g filter="url(#glow)">
<rect x="146" y="142" width="220" height="220" rx="44" fill="#FFFFFF" fill-opacity=".95"/>
<text x="256" y="309" font-family="Arial, sans-serif" font-size="142" font-weight="800" text-anchor="middle" fill="#6E46FF">文</text>
<path d="M178 390C230 372 282 372 334 390" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity=".7"/>
</g></g>
</svg>