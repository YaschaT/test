    <rect x="100" y="100" width="312" height="312" rx="82" fill="#0C1430" fill-opacity=".16" stroke="#FFFFFF" stroke-opacity=".18" stroke-width="7"/>
    <rect x="72" y="72" width="368" height="368" rx="104" fill="url(#catHighlight)"/>
